<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>India Emergency Chatbot 🤖</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
<style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Roboto', sans-serif; }
    body {
        height:100vh; display:flex; justify-content:center; align-items:center;
        background: url('https://wallpapercat.com/w/full/0/6/2/1143397-1500x2000-mobile-hd-robot-wallpaper-photo.jpg') no-repeat center center fixed;
        background-size: cover;
    }

    .chat-container {
        width: 400px; height: 600px;
        background: rgba(255,255,255,0.95);
        border-radius: 20px;
        display: flex; flex-direction: column;
        box-shadow: 0 8px 25px rgba(0,0,0,0.5);
        overflow: hidden;
    }

    .chat-header { background:#1e90ff; padding:20px; text-align:center; color:white; font-size:1.3em; font-weight:bold; }
    .chat-messages { flex:1; padding:20px; overflow-y:auto; display:flex; flex-direction:column; gap:15px; }
    .message { max-width:80%; padding:10px 15px; border-radius:15px; font-size:0.95em; }
    .user-message { align-self:flex-end; background:#1e90ff; color:white; border-bottom-right-radius:0; }
    .bot-message { align-self:flex-start; background:#f0f0f0; color:#333; border-bottom-left-radius:0; }

    .chat-input { display:flex; border-top:1px solid #ddd; padding:10px; background:#fafafa; }
    .chat-input input { flex:1; padding:10px; border:1px solid #ddd; border-radius:20px; outline:none; font-size:1em; }
    .chat-input button { margin-left:5px; padding:10px 12px; background:#1e90ff; border:none; color:white; font-weight:bold; border-radius:20px; cursor:pointer; transition:0.3s; }
    .chat-input button:hover { background:#0077cc; }

    .chat-messages::-webkit-scrollbar { width:6px; }
    .chat-messages::-webkit-scrollbar-thumb { background:#1e90ff; border-radius:3px; }
</style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">🤖 India Emergency Chatbot</div>
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-input">
        <input type="text" id="userInput" placeholder="Type your message..." />
        <button onclick="sendMessage()">Send</button>
        <button onclick="startVoiceInput()">🎤</button>
    </div>
</div>

<script>
const chatMessages = document.getElementById('chatMessages');
const userInput = document.getElementById('userInput');

// ===== Send Text Message =====
async function sendMessage(msgText=null) {
    const msg = msgText || userInput.value.trim();
    if(!msg) return;

    // Display user message
    const userMsgDiv = document.createElement('div');
    userMsgDiv.className = 'message user-message';
    userMsgDiv.textContent = msg;
    chatMessages.appendChild(userMsgDiv);
    chatMessages.scrollTop = chatMessages.scrollHeight;
    if(!msgText) userInput.value = '';

    // Send to backend
    try {
        const response = await fetch('http://localhost:3000/chat', {
            method:'POST',
            headers:{ 'Content-Type':'application/json' },
            body: JSON.stringify({ message: msg })
        });
        const data = await response.json();

        const botMsgDiv = document.createElement('div');
        botMsgDiv.className = 'message bot-message';
        botMsgDiv.textContent = data.reply;
        chatMessages.appendChild(botMsgDiv);
        chatMessages.scrollTop = chatMessages.scrollHeight;

        // ===== Voice Output =====
        const utterance = new SpeechSynthesisUtterance(data.reply);
        utterance.lang = 'en-IN';
        speechSynthesis.speak(utterance);

    } catch(err) {
        const botMsgDiv = document.createElement('div');
        botMsgDiv.className = 'message bot-message';
        botMsgDiv.textContent = "⚠️ Server error. Please try again!";
        chatMessages.appendChild(botMsgDiv);
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }
}

// ===== Press Enter to Send =====
userInput.addEventListener('keypress', e => { if(e.key==='Enter') sendMessage(); });

// ===== Voice Input =====
function startVoiceInput() {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if(!SpeechRecognition){ alert("Your browser does not support voice input."); return; }

    const recognition = new SpeechRecognition();
    recognition.lang = 'en-IN';
    recognition.interimResults = false;
    recognition.maxAlternatives = 1;

    recognition.start();

    recognition.onresult = (event) => {
        const transcript = event.results[0][0].transcript;
        sendMessage(transcript);
    };

    recognition.onerror = (event) => { console.error("Voice input error:", event.error); }
}
</script>

</body>
</html>
